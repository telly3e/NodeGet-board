name: Sync upstream

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/NodeSeekDev/NodeGet-board.git
          git fetch upstream

      - name: Sync main from upstream
        run: |
          git checkout main
          git reset --hard upstream/main
          git push origin main --force
